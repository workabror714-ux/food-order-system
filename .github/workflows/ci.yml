name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bog'liqliklar
        run: npm install --no-audit --no-fund

      - name: Sintaksis tekshiruvi
        run: |
          for f in $(find . -name "*.js" -not -path "./node_modules/*"); do node --check "$f"; done

      - name: Serverni ishga tushirish
        env:
          MONGODB_URI: mongodb://localhost:27017/ci
          JWT_SECRET: ci_secret_key
          NODE_ENV: production
          PORT: "5000"
          CORS_ORIGINS: http://localhost:3000
        run: |
          node server.js &
          for i in $(seq 1 30); do curl -sf http://localhost:5000/health && break; sleep 1; done

      - name: Testlar
        run: BASE_URL=http://localhost:5000 npm test

  client-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: CI=false npm run build
