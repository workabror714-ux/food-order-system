# Yalpiz — to'liq stack: `docker compose up -d`
# Maxfiy kalitlarni root `.env` ga qo'ying (JWT_SECRET, TELEGRAM_*, PAYME_*, CLICK_*, MILLENIUM_*).
# Compose root `.env` ni avtomatik o'qiydi va ${VAR} larni almashtiradi.

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/food-order-system
      REDIS_URL: redis://redis:6379
      RUN_JOBS: "false"            # fon jarayonlari worker'da
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_IN_ENV}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      TRUST_PROXY: "1"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_STAFF_CHAT_ID: ${TELEGRAM_STAFF_CHAT_ID:-}
      TELEGRAM_ALLOWED_CHATS: ${TELEGRAM_ALLOWED_CHATS:-}
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
      PAYME_KEY: ${PAYME_KEY:-}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID:-}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
      MILLENIUM_ENABLED: ${MILLENIUM_ENABLED:-false}
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: ./server
    command: ["node", "worker.js"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/food-order-system
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mongo_data:
